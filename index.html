<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>OE Field Tool</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="OE Field Tool">
<meta name="theme-color" content="#0A1620">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --navy-950:#0A1620;
    --navy-900:#0D1B26;
    --navy-800:#123047;
    --steel-700:#1E4258;
    --steel-600:#2B5570;
    --brass:#C9963A;
    --brass-glow:#F2C572;
    --fog:#E7E2D6;
    --fog-dim:#93A6AF;
    --alarm:#C0453A;
    --ok:#4C8C6B;
    --rivet:#3a5468;
    font-size:16px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:
      radial-gradient(ellipse at top, #0F2233 0%, var(--navy-950) 60%),
      var(--navy-950);
    background-attachment:fixed;
    color:var(--fog);
    font-family:'IBM Plex Sans',sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow-x:hidden;
    position:relative;
  }
  body::before{
    content:"";
    position:fixed;
    inset:0;
    background-image:
      linear-gradient(rgba(200,220,230,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,220,230,0.025) 1px, transparent 1px);
    background-size:36px 36px;
    pointer-events:none;
    z-index:0;
  }
  .app{
    position:relative;
    z-index:1;
    width:100%;
    max-width:440px;
    margin:24px;
  }
  .app.wide{max-width:760px;}

  /* ---------- Panel shell ---------- */
  .panel{
    background:linear-gradient(180deg,var(--navy-800),var(--navy-900));
    border:1px solid var(--steel-700);
    border-radius:10px;
    box-shadow:
      0 30px 60px -20px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(255,255,255,0.04);
    padding:28px 26px 24px;
    position:relative;
  }
  .rivet{
    position:absolute;
    width:9px;height:9px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #7d92a0, var(--rivet) 70%);
    box-shadow:inset 0 1px 1px rgba(0,0,0,0.5);
  }
  .rivet.tl{top:10px;left:10px;} .rivet.tr{top:10px;right:10px;}
  .rivet.bl{bottom:10px;left:10px;} .rivet.br{bottom:10px;right:10px;}

  .plate{
    text-align:center;
    padding-bottom:18px;
    margin-bottom:20px;
    border-bottom:1px dashed var(--steel-700);
  }
  .plate .brand{
    font-family:'Rajdhani',sans-serif;
    font-weight:700;
    font-size:1.5rem;
    letter-spacing:0.14em;
    color:var(--fog);
    text-transform:uppercase;
  }
  .plate .brand span{color:var(--brass);}
  .plate .sub{
    font-family:'IBM Plex Mono',monospace;
    font-size:0.68rem;
    letter-spacing:0.12em;
    color:var(--fog-dim);
    text-transform:uppercase;
    margin-top:4px;
  }

  /* ---------- Power switch (signature element) ---------- */
  .power-stage{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
    padding:10px 0 4px;
  }
  .led{
    width:12px;height:12px;border-radius:50%;
    background:#3a2412;
    box-shadow:inset 0 0 2px rgba(0,0,0,0.8);
    transition:background 0.4s, box-shadow 0.4s;
  }
  .led.on{
    background:var(--brass-glow);
    box-shadow:0 0 8px 2px rgba(242,197,114,0.75), 0 0 22px 6px rgba(201,150,58,0.35);
  }
  .switch-wrap{
    display:flex; align-items:center; gap:12px;
    font-family:'IBM Plex Mono',monospace;
    font-size:0.68rem;
    letter-spacing:0.1em;
    color:var(--fog-dim);
    text-transform:uppercase;
  }
  .rocker{
    width:56px;height:30px;
    background:linear-gradient(180deg,#2a4457,#152532);
    border:1px solid var(--steel-700);
    border-radius:6px;
    position:relative;
    cursor:pointer;
    box-shadow:inset 0 2px 4px rgba(0,0,0,0.5);
  }
  .rocker .knob{
    position:absolute;
    top:3px; left:3px;
    width:24px;height:22px;
    border-radius:4px;
    background:linear-gradient(180deg,#7f8f98,#4b5c66);
    box-shadow:0 2px 3px rgba(0,0,0,0.5);
    transition:left 0.25s ease;
  }
  .rocker.up .knob{left:27px;background:linear-gradient(180deg,var(--brass-glow),var(--brass));}
  .power-hint{
    font-size:0.66rem;
    color:var(--fog-dim);
    font-family:'IBM Plex Mono',monospace;
    letter-spacing:0.08em;
    min-height:14px;
  }

  /* ---------- Form ---------- */
  .stage{
    animation:reveal 0.5s ease both;
  }
  @keyframes reveal{
    0%{opacity:0; transform:translateY(6px); filter:brightness(0.4);}
    60%{filter:brightness(1.3);}
    100%{opacity:1; transform:translateY(0); filter:brightness(1);}
  }
  .field{margin-bottom:14px;}
  .field label{
    display:block;
    font-family:'IBM Plex Mono',monospace;
    font-size:0.66rem;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--fog-dim);
    margin-bottom:6px;
  }
  .field input, .field select{
    width:100%;
    background:#0C1D29;
    border:1px solid var(--steel-700);
    border-radius:5px;
    padding:11px 12px;
    color:var(--fog);
    font-family:'IBM Plex Mono',monospace;
    font-size:0.9rem;
    outline:none;
    transition:border-color 0.2s, box-shadow 0.2s;
  }
  .field input:focus, .field select:focus{
    border-color:var(--brass);
    box-shadow:0 0 0 3px rgba(201,150,58,0.18);
  }
  .btn{
    width:100%;
    background:linear-gradient(180deg,#D9A94A,var(--brass));
    border:none;
    border-radius:6px;
    padding:12px;
    color:#231604;
    font-family:'Rajdhani',sans-serif;
    font-weight:700;
    font-size:0.95rem;
    letter-spacing:0.08em;
    text-transform:uppercase;
    cursor:pointer;
    transition:filter 0.15s, transform 0.05s;
  }
  .btn:hover{filter:brightness(1.08);}
  .btn:active{transform:translateY(1px);}
  .btn.ghost{
    background:transparent;
    border:1px solid var(--steel-700);
    color:var(--fog-dim);
    margin-top:8px;
  }
  .btn.ghost:hover{border-color:var(--brass); color:var(--brass);}
  .btn.small{padding:8px 10px; font-size:0.78rem; width:auto;}
  .btn.danger{background:linear-gradient(180deg,#d16856,var(--alarm)); color:#2a0d08;}

  .readout{
    margin-top:14px;
    font-family:'IBM Plex Mono',monospace;
    font-size:0.72rem;
    letter-spacing:0.05em;
    padding:9px 11px;
    border-radius:5px;
    border:1px solid var(--steel-700);
    background:#0C1D29;
    display:none;
  }
  .readout.show{display:block;}
  .readout.err{color:#F0A79A; border-color:rgba(192,69,58,0.6);}
  .readout.ok{color:#A9D3BE; border-color:rgba(76,140,107,0.6);}

  /* ---------- Dashboard ---------- */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:18px;
  }
  .who{font-family:'IBM Plex Mono',monospace; font-size:0.72rem; color:var(--fog-dim);}
  .who b{color:var(--brass);}
  .tabs{display:flex; gap:6px; margin-bottom:18px; flex-wrap:wrap;}
  .tab{
    font-family:'Rajdhani',sans-serif; font-weight:600; letter-spacing:0.05em;
    font-size:0.82rem; text-transform:uppercase;
    padding:8px 14px; border-radius:5px;
    border:1px solid var(--steel-700);
    color:var(--fog-dim); cursor:pointer; background:transparent;
  }
  .tab.active{border-color:var(--brass); color:var(--brass); background:rgba(201,150,58,0.08);}
  .cards{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  @media(max-width:520px){.cards{grid-template-columns:1fr;}}
  .card{
    border:1px solid var(--steel-700);
    border-radius:8px;
    padding:16px;
    background:#0F2432;
    min-height:110px;
    display:flex; flex-direction:column; justify-content:space-between;
  }
  .card h3{
    font-family:'Rajdhani',sans-serif; margin:0 0 6px; font-size:1.05rem;
    letter-spacing:0.03em; color:var(--fog);
  }
  .card p{margin:0; font-size:0.8rem; color:var(--fog-dim); line-height:1.4;}
  .tag{
    align-self:flex-start;
    font-family:'IBM Plex Mono',monospace; font-size:0.62rem;
    letter-spacing:0.08em; text-transform:uppercase;
    color:var(--fog-dim); border:1px solid var(--steel-700);
    padding:3px 7px; border-radius:20px; margin-top:10px;
  }

  .userlist{margin-top:16px; display:flex; flex-direction:column; gap:8px;}
  .urow{
    display:flex; align-items:center; justify-content:space-between;
    border:1px solid var(--steel-700); border-radius:6px; padding:10px 12px;
    background:#0C1D29;
  }
  .urow .name{font-family:'IBM Plex Mono',monospace; font-size:0.82rem;}
  .urow .role{color:var(--fog-dim); font-size:0.68rem; margin-left:8px;}

  .section-title{
    font-family:'Rajdhani',sans-serif; font-weight:600; letter-spacing:0.08em;
    text-transform:uppercase; font-size:0.85rem; color:var(--fog-dim);
    margin:22px 0 10px; padding-top:14px; border-top:1px dashed var(--steel-700);
  }
  .hidden{display:none;}
</style>
</head>
<body>

<div class="app" id="root"></div>

<script>
(function(){
  const root = document.getElementById('root');
  let session = null; // {u, role} — memory only, not persisted (by design)

  // ---------- storage helpers ----------
  // Uses this browser's localStorage. Accounts are stored per-device/per-browser —
  // there is no cross-device sync in this version.
  async function loadUsers(){
    try{
      const raw = localStorage.getItem('oe_app_users');
      return raw ? JSON.parse(raw) : [];
    }catch(e){ return []; }
  }
  async function saveUsers(list){
    try{
      localStorage.setItem('oe_app_users', JSON.stringify(list));
    }catch(e){
      console.error('Could not save accounts — storage may be full or blocked.', e);
    }
  }
  function bufToHex(buf){
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }
  function randSaltHex(){
    const arr = new Uint8Array(16);
    crypto.getRandomValues(arr);
    return bufToHex(arr.buffer);
  }
  async function hashPassword(password, saltHex){
    const enc = new TextEncoder();
    let data = enc.encode(saltHex + password);
    let digest = await crypto.subtle.digest('SHA-256', data);
    // light stretching
    for(let i=0;i<2000;i++){
      digest = await crypto.subtle.digest('SHA-256', new Uint8Array([...new Uint8Array(digest), ...enc.encode(saltHex)]));
    }
    return bufToHex(digest);
  }

  // ---------- rivets ----------
  function rivets(){
    return '<span class="rivet tl"></span><span class="rivet tr"></span><span class="rivet bl"></span><span class="rivet br"></span>';
  }

  // ---------- render: power-up gate wrapping login/setup ----------
  function renderGate(mode){ // mode: 'login' | 'setup'
    root.className = 'app';
    root.innerHTML = `
      <div class="panel">
        ${rivets()}
        <div class="plate">
          <div class="brand">OE <span>FIELD</span> TOOL</div>
          <div class="sub">Oddstøl Elektronikk · Bridge Access Panel</div>
        </div>
        <div class="power-stage">
          <div class="led" id="led"></div>
          <div class="switch-wrap">
            <span>Off</span>
            <div class="rocker" id="rocker"><div class="knob"></div></div>
            <span>On</span>
          </div>
          <div class="power-hint" id="powerhint">Flip the switch to power up the panel</div>
        </div>
        <div id="stageArea"></div>
      </div>
    `;
    const rocker = document.getElementById('rocker');
    const led = document.getElementById('led');
    const hint = document.getElementById('powerhint');
    rocker.addEventListener('click', ()=>{
      if(rocker.classList.contains('up')) return;
      rocker.classList.add('up');
      led.classList.add('on');
      hint.textContent = mode === 'setup' ? 'Panel commissioning ready' : 'Panel online';
      setTimeout(()=>{
        if(mode === 'setup') renderSetupForm(); else renderLoginForm();
      }, 350);
    });
  }

  function renderSetupForm(){
    const area = document.getElementById('stageArea');
    area.innerHTML = `
      <div class="stage">
        <div class="section-title" style="margin-top:14px;border-top:none;padding-top:0;">First-time setup — create the admin account</div>
        <div class="field"><label>Username</label><input id="su" autocomplete="username"></div>
        <div class="field"><label>Password</label><input id="sp" type="password" autocomplete="new-password"></div>
        <div class="field"><label>Confirm password</label><input id="sp2" type="password" autocomplete="new-password"></div>
        <button class="btn" id="commissionBtn">Commission panel</button>
        <div class="readout" id="setupReadout"></div>
      </div>
    `;
    document.getElementById('commissionBtn').addEventListener('click', async ()=>{
      const u = document.getElementById('su').value.trim().toLowerCase();
      const p = document.getElementById('sp').value;
      const p2 = document.getElementById('sp2').value;
      const ro = document.getElementById('setupReadout');
      ro.className = 'readout show';
      if(!u || !p){ ro.classList.add('err'); ro.textContent='Username and password are required.'; return; }
      if(p !== p2){ ro.classList.add('err'); ro.textContent='Passwords do not match.'; return; }
      if(p.length < 6){ ro.classList.add('err'); ro.textContent='Password should be at least 6 characters.'; return; }
      const salt = randSaltHex();
      const hash = await hashPassword(p, salt);
      const users = [{u, salt, hash, role:'admin', created: Date.now()}];
      await saveUsers(users);
      session = {u, role:'admin'};
      ro.classList.remove('err'); ro.classList.add('ok');
      ro.textContent = 'Admin account created. Logging in…';
      setTimeout(renderDashboard, 500);
    });
  }

  function renderLoginForm(){
    const area = document.getElementById('stageArea');
    area.innerHTML = `
      <div class="stage">
        <div class="field"><label>Username</label><input id="lu" autocomplete="username"></div>
        <div class="field"><label>Password</label><input id="lp" type="password" autocomplete="current-password"></div>
        <button class="btn" id="loginBtn">Log in</button>
        <div class="readout" id="loginReadout"></div>
      </div>
    `;
    document.getElementById('lp').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
    document.getElementById('loginBtn').addEventListener('click', doLogin);

    async function doLogin(){
      const u = document.getElementById('lu').value.trim().toLowerCase();
      const p = document.getElementById('lp').value;
      const ro = document.getElementById('loginReadout');
      ro.className = 'readout show';
      const users = await loadUsers();
      const rec = users.find(x=>x.u === u);
      if(!rec){ ro.classList.add('err'); ro.textContent = 'ACCESS DENIED — unknown username.'; return; }
      const hash = await hashPassword(p, rec.salt);
      if(hash !== rec.hash){ ro.classList.add('err'); ro.textContent = 'ACCESS DENIED — incorrect password.'; return; }
      session = {u: rec.u, role: rec.role};
      ro.classList.remove('err'); ro.classList.add('ok');
      ro.textContent = 'Access granted.';
      setTimeout(renderDashboard, 350);
    }
  }

  // ---------- dashboard ----------
  function renderDashboard(tab){
    tab = tab || 'overview';
    root.className = 'app wide';
    root.innerHTML = `
      <div class="panel">
        ${rivets()}
        <div class="topbar">
          <div class="plate" style="border:none;margin:0;padding:0;text-align:left;">
            <div class="brand" style="font-size:1.15rem;">OE <span>FIELD</span> TOOL</div>
          </div>
          <div class="who">Logged in as <b>${session.u}</b> (${session.role}) · <a href="#" id="logoutLink" style="color:var(--fog-dim);">log out</a></div>
        </div>
        <div class="tabs" id="tabs">
          <button class="tab" data-tab="overview">Overview</button>
          <button class="tab" data-tab="reference">Reference</button>
          <button class="tab" data-tab="calculators">Calculators</button>
          ${session.role==='admin' ? '<button class="tab" data-tab="admin">Admin</button>' : ''}
        </div>
        <div id="tabContent"></div>
      </div>
    `;
    document.getElementById('logoutLink').addEventListener('click', (e)=>{
      e.preventDefault();
      session = null;
      boot();
    });
    Array.from(document.querySelectorAll('.tab')).forEach(btn=>{
      btn.addEventListener('click', ()=> renderDashboard(btn.dataset.tab));
    });
    document.querySelectorAll('.tab').forEach(b=>{
      if(b.dataset.tab === tab) b.classList.add('active');
    });

    const content = document.getElementById('tabContent');
    if(tab === 'overview'){
      content.innerHTML = `
        <div class="cards">
          <div class="card"><h3>Checklists &amp; Jobs</h3><p>Job checklists, notes and photos per vessel.</p><span class="tag">Not installed yet</span></div>
          <div class="card"><h3>Reference Library</h3><p>SFI codes and equipment specs.</p><span class="tag">Not installed yet</span></div>
          <div class="card"><h3>Calculators</h3><p>Cable sizing, fuse lists and conversions.</p><span class="tag">Not installed yet</span></div>
          <div class="card"><h3>Admin</h3><p>Manage who can log in to this panel.</p><span class="tag">${session.role==='admin' ? 'Available' : 'Admin only'}</span></div>
        </div>
      `;
    } else if(tab === 'reference' || tab === 'calculators'){
      content.innerHTML = `<div class="card" style="min-height:80px;"><h3>Coming soon</h3><p>Tell Claude what you want in here and it'll get built into this panel.</p></div>`;
    } else if(tab === 'admin' && session.role==='admin'){
      renderAdmin(content);
    }
  }

  async function renderAdmin(content){
    const users = await loadUsers();
    content.innerHTML = `
      <div class="section-title" style="margin-top:0;border-top:none;padding-top:0;">Create new account</div>
      <div class="field"><label>Username</label><input id="nu"></div>
      <div class="field"><label>Temporary password</label><input id="np" type="password"></div>
      <div class="field"><label>Role</label>
        <select id="nrole"><option value="user">User</option><option value="admin">Admin</option></select>
      </div>
      <button class="btn" id="addUserBtn">Create account</button>
      <div class="readout" id="adminReadout"></div>
      <div class="section-title">Existing accounts</div>
      <div class="userlist" id="userlist"></div>
    `;
    function renderList(list){
      const ul = document.getElementById('userlist');
      ul.innerHTML = list.map(x => `
        <div class="urow">
          <div><span class="name">${x.u}</span><span class="role">${x.role}</span></div>
          <button class="btn danger small" data-del="${x.u}">Remove</button>
        </div>
      `).join('');
      ul.querySelectorAll('[data-del]').forEach(btn=>{
        btn.addEventListener('click', async ()=>{
          const target = btn.dataset.del;
          let list2 = await loadUsers();
          const admins = list2.filter(x=>x.role==='admin');
          if(target === session.u){ flash('You cannot remove the account you are logged in as.'); return; }
          if(admins.length===1 && admins[0].u===target){ flash('Cannot remove the last remaining admin.'); return; }
          list2 = list2.filter(x=>x.u!==target);
          await saveUsers(list2);
          renderList(list2);
        });
      });
    }
    function flash(msg){
      const ro = document.getElementById('adminReadout');
      ro.className = 'readout show err';
      ro.textContent = msg;
    }
    renderList(users);
    document.getElementById('addUserBtn').addEventListener('click', async ()=>{
      const u = document.getElementById('nu').value.trim().toLowerCase();
      const p = document.getElementById('np').value;
      const role = document.getElementById('nrole').value;
      const ro = document.getElementById('adminReadout');
      ro.className = 'readout show';
      if(!u || !p){ ro.classList.add('err'); ro.textContent='Username and password are required.'; return; }
      if(p.length < 6){ ro.classList.add('err'); ro.textContent='Password should be at least 6 characters.'; return; }
      let list = await loadUsers();
      if(list.find(x=>x.u===u)){ ro.classList.add('err'); ro.textContent='That username already exists.'; return; }
      const salt = randSaltHex();
      const hash = await hashPassword(p, salt);
      list.push({u, salt, hash, role, created: Date.now()});
      await saveUsers(list);
      ro.classList.remove('err'); ro.classList.add('ok');
      ro.textContent = `Account "${u}" created.`;
      document.getElementById('nu').value=''; document.getElementById('np').value='';
      renderList(list);
    });
  }

  // ---------- boot ----------
  async function boot(){
    session = null;
    const users = await loadUsers();
    renderGate(users.length === 0 ? 'setup' : 'login');
  }
  boot();
})();
</script>
</body>
</html>
