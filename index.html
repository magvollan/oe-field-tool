<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>OE Field Tool</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="OE Field Tool">
<meta name="theme-color" content="#000000">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-950:#000000;
    --bg-900:#0A0A0A;
    --bg-800:#161616;
    --gray-700:#3A3A3A;
    --gray-600:#4E4E4E;
    --accent:#D9342B;
    --accent-glow:#FF5C4D;
    --fog:#EDEDED;
    --fog-dim:#9A9A9A;
    --alarm:#E0483B;
    --ok:#4C8C6B;
    --rivet:#4a4a4a;
    --grid-line:rgba(255,255,255,0.03);
    --btn-grad-top:#5c5c5c;
    --btn-grad-bottom:#3a3a3a;
    --btn-text:#F2F2F2;
    --recessed-bg:#0D0D0D;
    --card-bg:#111111;
    --err-text:#F0A79A;
    --ok-text:#A9D3BE;
    font-size:16px;
  }
  [data-theme="light"]{
    --bg-950:#F3F3F1;
    --bg-900:#EAEAE7;
    --bg-800:#FFFFFF;
    --gray-700:#D9D9D6;
    --gray-600:#B7B7B3;
    --accent:#C22B22;
    --accent-glow:#E0483B;
    --fog:#1C1C1B;
    --fog-dim:#6E6E6A;
    --alarm:#C22B22;
    --ok:#3F7A5B;
    --rivet:#C7C7C3;
    --grid-line:rgba(0,0,0,0.035);
    --btn-grad-top:#E4E4E1;
    --btn-grad-bottom:#CFCFCB;
    --btn-text:#1C1C1B;
    --recessed-bg:#EDEDEA;
    --card-bg:#FAFAF8;
    --err-text:#A5291F;
    --ok-text:#2F6B4A;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse at top, var(--bg-800) 0%, var(--bg-950) 60%),
      var(--bg-950);
    background-attachment:fixed;
    color:var(--fog);
    font-family:'IBM Plex Sans',sans-serif;
    min-height:100vh;
    min-height:100dvh;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    overflow-x:hidden;
    position:relative;
    padding:24px 0;
    box-sizing:border-box;
  }
  body::before{
    content:"";
    position:fixed;
    inset:0;
    background-image:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size:36px 36px;
    pointer-events:none;
    z-index:0;
  }
  .app{
    position:relative;
    z-index:1;
    width:100%;
    max-width:440px;
    margin:24px;
  }
  .app.wide{max-width:760px;}
  @media(min-width:900px){
    .app.wide{max-width:1200px;}
  }

  /* ---------- Panel shell ---------- */
  .panel{
    background:linear-gradient(180deg,var(--bg-800),var(--bg-900));
    border:1px solid var(--gray-700);
    border-radius:10px;
    box-shadow:
      0 30px 60px -20px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(255,255,255,0.04);
    padding:28px 26px 24px;
    position:relative;
  }
  .rivet{
    position:absolute;
    width:9px;height:9px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #8a8a8a, var(--rivet) 70%);
    box-shadow:inset 0 1px 1px rgba(0,0,0,0.5);
  }
  .rivet.tl{top:10px;left:10px;} .rivet.tr{top:10px;right:10px;}
  .rivet.bl{bottom:10px;left:10px;} .rivet.br{bottom:10px;right:10px;}

  .plate{
    text-align:center;
    padding-bottom:18px;
    margin-bottom:20px;
    border-bottom:1px dashed var(--gray-700);
  }
  .plate .brand{
    font-family:'Rajdhani',sans-serif;
    font-weight:700;
    font-size:1.5rem;
    letter-spacing:0.14em;
    color:var(--fog);
    text-transform:uppercase;
  }
  .plate .brand span{color:var(--accent);}
  .plate .sub{
    font-family:'IBM Plex Mono',monospace;
    font-size:0.68rem;
    letter-spacing:0.12em;
    color:var(--fog-dim);
    text-transform:uppercase;
    margin-top:4px;
  }

  /* ---------- Power switch (signature element) ---------- */
  .power-stage{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
    padding:10px 0 4px;
  }
  .led{
    width:12px;height:12px;border-radius:50%;
    background:#2a1210;
    box-shadow:inset 0 0 2px rgba(0,0,0,0.8);
    transition:background 0.4s, box-shadow 0.4s;
  }
  .led.on{
    background:var(--accent-glow);
    box-shadow:0 0 8px 2px rgba(255,92,77,0.75), 0 0 22px 6px rgba(217,52,43,0.35);
  }
  .switch-wrap{
    display:flex; align-items:center; gap:12px;
    font-family:'IBM Plex Mono',monospace;
    font-size:0.68rem;
    letter-spacing:0.1em;
    color:var(--fog-dim);
    text-transform:uppercase;
  }
  .rocker{
    width:56px;height:30px;
    background:linear-gradient(180deg,#333333,#1a1a1a);
    border:1px solid var(--gray-700);
    border-radius:6px;
    position:relative;
    cursor:pointer;
    box-shadow:inset 0 2px 4px rgba(0,0,0,0.5);
  }
  .rocker .knob{
    position:absolute;
    top:3px; left:3px;
    width:24px;height:22px;
    border-radius:4px;
    background:linear-gradient(180deg,#8a8a8a,#565656);
    box-shadow:0 2px 3px rgba(0,0,0,0.5);
    transition:left 0.25s ease;
  }
  .rocker.up .knob{left:27px;background:linear-gradient(180deg,var(--accent-glow),var(--accent));}
  .power-hint{
    font-size:0.66rem;
    color:var(--fog-dim);
    font-family:'IBM Plex Mono',monospace;
    letter-spacing:0.08em;
    min-height:14px;
  }

  /* ---------- Form ---------- */
  .stage{
    animation:reveal 0.5s ease both;
  }
  @keyframes reveal{
    0%{opacity:0; transform:translateY(6px); filter:brightness(0.4);}
    60%{filter:brightness(1.3);}
    100%{opacity:1; transform:translateY(0); filter:brightness(1);}
  }
  .field{margin-bottom:14px;}
  .field label{
    display:block;
    font-family:'IBM Plex Mono',monospace;
    font-size:0.66rem;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--fog-dim);
    margin-bottom:6px;
  }
  .field input, .field select{
    width:100%;
    background:var(--recessed-bg);
    border:1px solid var(--gray-700);
    border-radius:5px;
    padding:11px 12px;
    color:var(--fog);
    font-family:'IBM Plex Mono',monospace;
    font-size:0.9rem;
    outline:none;
    transition:border-color 0.2s, box-shadow 0.2s;
  }
  .field input:focus, .field select:focus{
    border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(217,52,43,0.18);
  }
  .btn{
    width:100%;
    background:linear-gradient(180deg,var(--btn-grad-top),var(--btn-grad-bottom));
    border:none;
    border-radius:6px;
    padding:12px;
    color:var(--btn-text);
    font-family:'Rajdhani',sans-serif;
    font-weight:700;
    font-size:0.95rem;
    letter-spacing:0.08em;
    text-transform:uppercase;
    cursor:pointer;
    transition:filter 0.15s, transform 0.05s;
  }
  .btn:hover{filter:brightness(1.08);}
  .btn:active{transform:translateY(1px);}
  .btn.ghost{
    background:transparent;
    border:1px solid var(--gray-700);
    color:var(--fog-dim);
    margin-top:8px;
  }
  .btn.ghost:hover{border-color:var(--accent); color:var(--accent);}
  .btn.small{padding:8px 10px; font-size:0.78rem; width:auto;}
  .btn.danger{background:linear-gradient(180deg,#e0483b,#a5271d); color:#FCEAE8;}

  .readout{
    margin-top:14px;
    font-family:'IBM Plex Mono',monospace;
    font-size:0.72rem;
    letter-spacing:0.05em;
    padding:9px 11px;
    border-radius:5px;
    border:1px solid var(--gray-700);
    background:var(--recessed-bg);
    display:none;
  }
  .readout.show{display:block;}
  .readout.err{color:var(--err-text); border-color:rgba(192,69,58,0.6);}
  .readout.ok{color:var(--ok-text); border-color:rgba(76,140,107,0.6);}

  /* ---------- Dashboard ---------- */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:18px;
  }
  .who{font-family:'IBM Plex Mono',monospace; font-size:0.72rem; color:var(--fog-dim);}
  .who b{color:var(--accent);}
  .tabs{display:flex; gap:6px; margin-bottom:18px; flex-wrap:wrap;}
  .tab{
    font-family:'Rajdhani',sans-serif; font-weight:600; letter-spacing:0.05em;
    font-size:0.82rem; text-transform:uppercase;
    padding:8px 14px; border-radius:5px;
    border:1px solid var(--gray-700);
    color:var(--fog-dim); cursor:pointer; background:transparent;
  }
  .tab.active{border-color:var(--accent); color:var(--accent); background:rgba(217,52,43,0.1);}
  .cards{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  @media(max-width:520px){.cards{grid-template-columns:1fr;}}
  @media(min-width:900px){.cards{grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));}}
  .card{
    border:1px solid var(--gray-700);
    border-radius:8px;
    padding:16px;
    background:var(--card-bg);
    min-height:110px;
    display:flex; flex-direction:column; justify-content:space-between;
  }
  .card h3{
    font-family:'Rajdhani',sans-serif; margin:0 0 6px; font-size:1.05rem;
    letter-spacing:0.03em; color:var(--fog);
  }
  .card p{margin:0; font-size:0.8rem; color:var(--fog-dim); line-height:1.4;}
  .tag{
    align-self:flex-start;
    font-family:'IBM Plex Mono',monospace; font-size:0.62rem;
    letter-spacing:0.08em; text-transform:uppercase;
    color:var(--fog-dim); border:1px solid var(--gray-700);
    padding:3px 7px; border-radius:20px; margin-top:10px;
  }

  .userlist{margin-top:16px; display:flex; flex-direction:column; gap:8px;}

  /* ---------- Messages / chat ---------- */
  .convo-switcher{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px;}
  .unread-badge{
    display:inline-block; min-width:16px; padding:0 5px; margin-left:6px;
    border-radius:20px; background:var(--accent); color:#fff;
    font-size:0.68rem; line-height:16px; text-align:center;
  }
  .unread-flag{
    display:inline-block; margin-left:5px; color:var(--accent-glow);
    font-weight:700;
  }
  .seen-line{
    text-align:right; font-size:0.68rem; color:var(--fog-dim);
    font-family:'IBM Plex Mono',monospace; margin-top:2px;
  }
  .convo-btn{
    font-family:'IBM Plex Mono',monospace; font-size:0.78rem;
    padding:6px 12px; border-radius:20px;
    border:1px solid var(--gray-700); color:var(--fog-dim);
    background:transparent; cursor:pointer;
  }
  .convo-btn.active{border-color:var(--accent); color:var(--accent); background:rgba(217,52,43,0.1);}
  .chat-thread{
    display:flex; flex-direction:column; gap:10px;
    max-height:50vh; min-height:200px; overflow-y:auto;
    border:1px solid var(--gray-700); border-radius:8px;
    padding:14px; background:var(--card-bg); margin-bottom:12px;
  }
  .msg-row{display:flex; flex-direction:column; max-width:80%;}
  .msg-row.mine{align-self:flex-end; align-items:flex-end;}
  .msg-row.theirs{align-self:flex-start; align-items:flex-start;}
  .msg-bubble{
    padding:8px 12px; border-radius:10px; font-size:0.85rem; line-height:1.4;
    border:1px solid var(--gray-700);
  }
  .msg-row.mine .msg-bubble{background:rgba(217,52,43,0.12); border-color:rgba(217,52,43,0.35);}
  .msg-row.theirs .msg-bubble{background:var(--recessed-bg);}
  .msg-meta{
    font-family:'IBM Plex Mono',monospace; font-size:0.65rem; color:var(--fog-dim);
    margin-top:3px; display:flex; gap:8px; align-items:center;
  }
  .msg-meta a{color:var(--fog-dim); cursor:pointer;}
  .msg-meta a:hover{color:var(--accent);}
  .chat-input-row{display:flex; gap:8px;}
  .chat-input-row input{flex:1;}
  .chat-input-row .btn{width:auto;}
  .urow{
    display:flex; align-items:center; justify-content:space-between;
    border:1px solid var(--gray-700); border-radius:6px; padding:10px 12px;
    background:var(--recessed-bg);
  }
  .urow .name{font-family:'IBM Plex Mono',monospace; font-size:0.82rem;}
  .urow .role{color:var(--fog-dim); font-size:0.68rem; margin-left:8px;}

  .section-title{
    font-family:'Rajdhani',sans-serif; font-weight:600; letter-spacing:0.08em;
    text-transform:uppercase; font-size:0.85rem; color:var(--fog-dim);
    margin:22px 0 10px; padding-top:14px; border-top:1px dashed var(--gray-700);
  }
  .hidden{display:none;}

  /* ---------- Modal overlay ---------- */
  .modal-backdrop{
    position:fixed; inset:0; background:rgba(0,0,0,0.78);
    display:flex; align-items:center; justify-content:center;
    padding:20px; z-index:1000;
    animation:fadeIn 0.15s ease both;
  }
  @keyframes fadeIn{ from{opacity:0;} to{opacity:1;} }
  .modal-panel{
    width:100%; max-width:460px; max-height:88vh; overflow-y:auto;
    background:linear-gradient(180deg,var(--bg-800),var(--bg-900));
    border:1px solid var(--gray-700); border-radius:10px;
    box-shadow:0 30px 60px -20px rgba(0,0,0,0.7);
    animation:reveal 0.2s ease both;
  }
  .modal-header{
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 18px; border-bottom:1px dashed var(--gray-700);
  }
  .modal-title{
    font-family:'Rajdhani',sans-serif; font-weight:700; letter-spacing:0.05em;
    text-transform:uppercase; font-size:1rem; color:var(--fog);
  }
  .modal-close{
    background:none; border:none; color:var(--fog-dim); font-size:1.4rem;
    line-height:1; cursor:pointer; padding:0 4px;
  }
  .modal-close:hover{ color:var(--accent); }
  .modal-body{ padding:18px; }
</style>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>

<body>

<div class="app" id="root"></div>

<script>
(function(){
  const root = document.getElementById('root');
  let session = null; // {u, status} — memory only, not persisted (by design)

  // ---------- theme (light / dark / auto) ----------
  // Per-device preference, stored in this browser's localStorage only.
  const THEME_KEY = 'oe_theme_pref';
  function getThemePref(){
    try{ return localStorage.getItem(THEME_KEY) || 'auto'; }catch(e){ return 'auto'; }
  }
  function setThemePref(pref){
    try{ localStorage.setItem(THEME_KEY, pref); }catch(e){}
    applyTheme(pref);
  }
  function applyTheme(pref){
    const resolved = pref === 'auto'
      ? (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark')
      : pref;
    document.documentElement.setAttribute('data-theme', resolved);
  }
  applyTheme(getThemePref()); // apply immediately, before any content renders, to avoid a flash
  if(window.matchMedia){
    window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', ()=>{
      if(getThemePref() === 'auto') applyTheme('auto');
    });
  }

  const DEFAULT_ROLES = ['Technician','Radio Surveyor','Engineer','Coordinator','HR'];
  const SECTIONS = [
    {key:'reference', label:'Library'},
    {key:'calculators', label:'Calculators'}
  ];
  const DEFAULT_ADMIN_USER = 'admin';
  const DEFAULT_ADMIN_PASS = 'OEAdmin';
  const SESSION_KEY = 'oe_session_user';

  // ---------- Firebase ----------
  // This config is a public identifier, not a secret — access is controlled by Firestore rules, not by hiding this.
  const firebaseConfig = {
    apiKey: "AIzaSyAw-IJTwUSRneJsjCg-WiI7cSc4iwEjrEw",
    authDomain: "oe-field-tool.firebaseapp.com",
    projectId: "oe-field-tool",
    storageBucket: "oe-field-tool.firebasestorage.app",
    messagingSenderId: "1089649415892",
    appId: "1:1089649415892:web:c993832503e3e4aeb58d41"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const USERS_COLLECTION = 'users';

  function usersCol(){ return db.collection(USERS_COLLECTION); }
  function libraryCol(){ return db.collection('library_items'); }
  function messagesCol(){ return db.collection('messages'); }
  function dmChannelId(a, b){
    return 'dm:' + [a, b].sort().join(':');
  }
  async function sendMessage(channel, text){
    await messagesCol().add({
      channel, text,
      from: session.u,
      fromName: (session.fullName && session.fullName.trim()) ? session.fullName.trim() : session.u,
      timestamp: Date.now()
    });
  }
  async function deleteMessageDoc(id){
    await messagesCol().doc(id).delete();
  }
  function receiptsCol(){ return db.collection('read_receipts'); }
  function receiptDocId(user, channel){ return user + '__' + channel; }
  async function setReadReceipt(user, channel, ts){
    await receiptsCol().doc(receiptDocId(user, channel)).set({user, channel, lastReadTs: ts});
  }
  // Per-user "clear chat" — hides everything before clearedAt for that one user only.
  // The messages themselves are untouched, so the other side keeps their full history
  // and has to clear their own copy separately if they want to.
  function chatClearsCol(){ return db.collection('chat_clears'); }
  function clearDocId(user, channel){ return user + '__' + channel; }
  async function setChatClear(user, channel, ts){
    await chatClearsCol().doc(clearDocId(user, channel)).set({user, channel, clearedAt: ts});
  }

  // ---------- unread tracking (badges + tab flag) ----------
  // Runs in the background for the whole session, not just while the Messages tab is open,
  // so the tab's exclamation flag stays accurate no matter where you're navigating.
  let myReadReceipts = {};       // channel -> lastReadTs (mine)
  let myClearedAt = {};          // channel -> clearedAt (mine) — messages before this are hidden from me only
  let allRelevantMessages = [];  // latest snapshot of every message across my channels
  let unreadCounts = {};         // channel -> unread count
  let totalUnread = 0;
  let globalMsgUnsub = null;

  async function getMyChannelIds(){
    const others = (await loadUsers()).filter(x => x.u !== session.u);
    return ['team', ...others.map(u => dmChannelId(session.u, u.u))];
  }
  function computeUnread(){
    const counts = {};
    allRelevantMessages.forEach(m=>{
      if(m.from === session.u) return; // never count your own messages as unread
      const lastRead = myReadReceipts[m.channel] || 0;
      const clearedAt = myClearedAt[m.channel] || 0;
      if(m.timestamp > lastRead && m.timestamp > clearedAt) counts[m.channel] = (counts[m.channel] || 0) + 1;
    });
    unreadCounts = counts;
    totalUnread = Object.values(counts).reduce((a,b)=>a+b, 0);
    updateUnreadUI();
  }
  function updateUnreadUI(){
    // Patch whatever's currently on screen directly, without a full re-render
    // (a global listener can fire while the person is on any tab).
    const tabBtn = document.querySelector('.tab[data-tab="messages"]');
    if(tabBtn){
      tabBtn.innerHTML = 'Messages' + (totalUnread > 0 ? '<span class="unread-flag">!</span>' : '');
    }
    document.querySelectorAll('.convo-btn').forEach(btn=>{
      const count = unreadCounts[btn.dataset.channel] || 0;
      const badgeEl = btn.querySelector('.convo-badge');
      if(badgeEl){
        badgeEl.innerHTML = count > 0 ? `<span class="unread-badge">${count}</span>` : '';
      }
    });
  }
  async function startMessageWatch(){
    teardownMessageWatch();
    const channelIds = await getMyChannelIds();
    myReadReceipts = {};
    myClearedAt = {};
    try{
      const snap = await receiptsCol().where('user', '==', session.u).get();
      snap.docs.forEach(d => { const data = d.data(); myReadReceipts[data.channel] = data.lastReadTs; });
    }catch(e){ console.error('Could not load read receipts.', e); }
    try{
      const clearSnap = await chatClearsCol().where('user', '==', session.u).get();
      clearSnap.docs.forEach(d => { const data = d.data(); myClearedAt[data.channel] = data.clearedAt; });
    }catch(e){ console.error('Could not load chat clears.', e); }
    if(channelIds.length === 0) return;
    globalMsgUnsub = messagesCol().where('channel', 'in', channelIds.slice(0,30))
      .onSnapshot(snap => {
        allRelevantMessages = snap.docs.map(d => ({id: d.id, ...d.data()}));
        computeUnread();
      }, err => console.error('Message watch error.', err));
  }
  function teardownMessageWatch(){
    if(globalMsgUnsub){ globalMsgUnsub(); globalMsgUnsub = null; }
  }
  async function markChannelRead(channel){
    const ts = Date.now();
    myReadReceipts[channel] = ts; // optimistic — zero the badge immediately
    computeUnread();
    try{ await setReadReceipt(session.u, channel, ts); }catch(e){ console.error('Could not save read receipt.', e); }

  // ---------- library (folders & files) ----------
  async function getLibraryChildren(parentId){
    try{
      const snap = await libraryCol().where('parentId', '==', parentId).get();
      const items = snap.docs.map(d => ({id: d.id, ...d.data()}));
      // folders first, then files, alphabetical within each
      items.sort((a,b) => {
        if(a.type !== b.type) return a.type === 'folder' ? -1 : 1;
        return (a.name||'').localeCompare(b.name||'');
      });
      return items;
    }catch(e){ console.error('Could not load library items.', e); return []; }
  }
  async function getLibraryItem(id){
    try{
      const doc = await libraryCol().doc(id).get();
      return doc.exists ? {id: doc.id, ...doc.data()} : null;
    }catch(e){ console.error('Could not load library item.', e); return null; }
  }
  async function addLibraryFolder(name, parentId){
    await libraryCol().add({type:'folder', name, parentId, createdAt: Date.now(), createdBy: session.u});
  }
  async function addLibraryFile(name, description, url, parentId){
    await libraryCol().add({type:'file', name, description, url, parentId, createdAt: Date.now(), createdBy: session.u});
  }
  async function deleteLibraryItemRecursive(id){
    const item = await getLibraryItem(id);
    if(!item) return;
    if(item.type === 'folder'){
      const children = await getLibraryChildren(id);
      for(const child of children){
        await deleteLibraryItemRecursive(child.id);
      }
    }
    await libraryCol().doc(id).delete();
  }

  // ---------- storage helpers ----------
  // Backed by Firestore. Anonymous auth (silent, no UI) satisfies the security
  // rules that gate this collection — it is not the app's own login screen.
  // Migrates old single-jobRole records to primaryRole/secondaryRoles shape on read,
  // so nothing breaks for accounts created before multi-role support existed.
  function normalizeUser(rec){
    if(!rec) return rec;
    if(!rec.primaryRole) rec.primaryRole = rec.jobRole || '';
    if(!Array.isArray(rec.secondaryRoles)) rec.secondaryRoles = [];
    return rec;
  }
  async function loadUsers(){
    try{
      const snap = await usersCol().get();
      return snap.docs.map(d => normalizeUser(d.data()));
    }catch(e){
      console.error('Could not load accounts from Firestore.', e);
      return [];
    }
  }
  async function getUser(u){
    try{
      const doc = await usersCol().doc(u).get();
      return doc.exists ? normalizeUser(doc.data()) : null;
    }catch(e){
      console.error('Could not load account from Firestore.', e);
      return null;
    }
  }
  async function saveUser(userObj){

  function bufToHex(buf){
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }
  function randSaltHex(){
    const arr = new Uint8Array(16);
    crypto.getRandomValues(arr);
    return bufToHex(arr.buffer);
  }
  async function hashPassword(password, saltHex){
    const enc = new TextEncoder();
    let data = enc.encode(saltHex + password);
    let digest = await crypto.subtle.digest('SHA-256', data);
    // light stretching
    for(let i=0;i<2000;i++){
      digest = await crypto.subtle.digest('SHA-256', new Uint8Array([...new Uint8Array(digest), ...enc.encode(saltHex)]));
    }
    return bufToHex(digest);
  }
  async function ensureSeedAdmin(){
    const existing = await getUser(DEFAULT_ADMIN_USER);
    const all = await loadUsers();
    if(all.length === 0 && !existing){
      const salt = randSaltHex();
      const hash = await hashPassword(DEFAULT_ADMIN_PASS, salt);
      await saveUser({u: DEFAULT_ADMIN_USER, salt, hash, status:'admin', fullName:'', primaryRole:'Coordinator', secondaryRoles:[], created: Date.now()});
    }
  }

  // ---------- roles & permissions ----------
  const metaDoc = (name) => db.collection('meta').doc(name);
  async function loadRoles(){
    try{
      const doc = await metaDoc('roles').get();
      return doc.exists ? (doc.data().list || []) : [];
    }catch(e){ console.error('Could not load roles.', e); return []; }
  }
  async function saveRoles(list){
    await metaDoc('roles').set({list});
  }
  async function loadPermissions(){
    try{
      const doc = await metaDoc('permissions').get();
      return doc.exists ? doc.data() : {};
    }catch(e){ console.error('Could not load permissions.', e); return {}; }
  }
  async function saveRolePermissions(role, perms){
    await metaDoc('permissions').set({[role]: perms}, {merge:true});
  }
  function emptyPerms(){
    const p = {};
    SECTIONS.forEach(s => p[s.key] = {read:false, write:false});
    return p;
  }
  async function ensureSeedRolesPermissions(){
    const rolesDoc = await metaDoc('roles').get();
    if(!rolesDoc.exists){
      await saveRoles(DEFAULT_ROLES);
      const seedPerms = {};
      DEFAULT_ROLES.forEach(r => {
        seedPerms[r] = {};
        SECTIONS.forEach(s => seedPerms[r][s.key] = {read:true, write:false});
      });
      await metaDoc('permissions').set(seedPerms);
    }
  }
  // What can this session write to? Admin status always can. Non-admins get the
  // union across their primary role + all secondary roles, same as read.
  async function getMyWritableSections(){
    if(session && session.status === 'admin') return SECTIONS.map(s=>s.key);
    const perms = await loadPermissions();
    const myRoles = session ? [session.primaryRole, ...(session.secondaryRoles||[])].filter(Boolean) : [];
    const writable = new Set();
    myRoles.forEach(r => {
      const rp = perms[r];
      if(rp) SECTIONS.forEach(s => { if(rp[s.key] && rp[s.key].write) writable.add(s.key); });
    });
    return SECTIONS.filter(s => writable.has(s.key)).map(s=>s.key);
  }
  // What can this session read? Admin status always sees everything.
  // Non-admins get the union of permissions across their primary role + all secondary roles.
  async function getMyReadableSections(){
    if(session && session.status === 'admin') return SECTIONS.map(s=>s.key);
    const perms = await loadPermissions();
    const myRoles = session ? [session.primaryRole, ...(session.secondaryRoles||[])].filter(Boolean) : [];
    const readable = new Set();
    myRoles.forEach(r => {
      const rp = perms[r];
      if(rp) SECTIONS.forEach(s => { if(rp[s.key] && rp[s.key].read) readable.add(s.key); });
    });
    return SECTIONS.filter(s => readable.has(s.key)).map(s=>s.key);
  }

  // ---------- presence heartbeat ----------
  // While logged in, quietly stamps this account's lastSeen every 20s so
  // admins can see who's currently active. Not a real-time push system —
  // just a freshness timestamp checked against a threshold.
  const ONLINE_THRESHOLD_MS = 45000;
  let heartbeatTimer = null;
  let adminUnsub = null;
  let adminTickTimer = null;
  let messagesUnsub = null;
  let seenUnsub = null;
  let messagesUsersUnsub = null;
  let usersStatusMap = {}; // username -> {online, lastSeen} — kept live while Messages tab is open
  function teardownAdminListener(){
    if(adminUnsub){ adminUnsub(); adminUnsub = null; }
    if(adminTickTimer){ clearInterval(adminTickTimer); adminTickTimer = null; }
  }
  function teardownMessagesListener(){
    if(messagesUnsub){ messagesUnsub(); messagesUnsub = null; }
    if(seenUnsub){ seenUnsub(); seenUnsub = null; }
    if(messagesUsersUnsub){ messagesUsersUnsub(); messagesUsersUnsub = null; }
  }
  function isOnline(username){
    const s = usersStatusMap[username];
    return !!(s && s.online && s.lastSeen && (Date.now() - s.lastSeen) < ONLINE_THRESHOLD_MS);
  }
  function statusDotHtml(username){
    if(!(username in usersStatusMap)) return '';
    const color = isOnline(username) ? 'var(--ok)' : '#555';
    return `<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${color};margin-right:6px;"></span>`;
  }
  async function beat(){
    if(!session) return;
    try{ await usersCol().doc(session.u).set({lastSeen: Date.now(), online: true}, {merge:true}); }
    catch(e){ console.error('Heartbeat failed.', e); }
  }
  function handleVisibility(){
    if(document.visibilityState === 'visible') beat();
  }
  function startHeartbeat(){
    beat();
    if(heartbeatTimer) clearInterval(heartbeatTimer);
    heartbeatTimer = setInterval(beat, 20000);
    document.addEventListener('visibilitychange', handleVisibility);
  }
  function stopHeartbeat(){
    if(heartbeatTimer){ clearInterval(heartbeatTimer); heartbeatTimer = null; }
    document.removeEventListener('visibilitychange', handleVisibility);
  }
  function firstNameOf(rec){
    const fn = (rec && rec.fullName || '').trim();
    return fn ? fn.split(' ')[0] : (rec ? rec.u : '');
  }
  function timeAgo(ts){
    if(!ts) return 'never';
    const s = Math.floor((Date.now() - ts) / 1000);
    if(s < 60) return 'just now';
    const m = Math.floor(s/60);
    if(m < 60) return m + ' min ago';
    const h = Math.floor(m/60);
    if(h < 24) return h + ' hr ago';
    return Math.floor(h/24) + ' d ago';
  }

  }

      document.getElementById('chatInput').placeholder = `Message ${label}…`;
      document.getElementById('seenLine').textContent = '';
      switcherEl.querySelectorAll('.convo-btn').forEach(b=>{
        b.classList.toggle('active', b.dataset.channel === channel);
      });
      updateDmHeader();
      subscribeToChannel(channel);
    }
    switcherEl.querySelectorAll('.convo-btn').forEach(btn=>{
      btn.addEventListener('click', ()=> switchConvo(btn.dataset.channel, btn.dataset.label, btn.dataset.other || null));
    });

    function subscribeToChannel(channel){
      teardownMessagesListener();
      const threadEl = document.getElementById('chatThread');
      threadEl.innerHTML = '<div style="color:var(--fog-dim); font-size:0.82rem;">Loading…</div>';
      messagesUnsub = messagesCol().where('channel', '==', channel).orderBy('timestamp', 'asc')
        .onSnapshot(snap => {
          const msgs = snap.docs.map(d => ({id: d.id, ...d.data()}));
          const clearedAt = myClearedAt[channel] || 0;
          const visible = msgs.filter(m => m.timestamp > clearedAt); // hide anything I've cleared, mine only
          renderThread(visible);
          markChannelRead(channel); // viewing it counts as read, including new messages that arrive while open
        }, err => {
          console.error('Message listener error.', err);
          threadEl.innerHTML = '<div style="color:var(--err-text); font-size:0.82rem;">Could not load messages.</div>';
        });

      if(activeOtherUser){
        seenUnsub = receiptsCol().doc(receiptDocId(activeOtherUser, channel)).onSnapshot(doc=>{
          const theirLastRead = doc.exists ? doc.data().lastReadTs : 0;
          updateSeenLine(theirLastRead);
        }, err => console.error('Seen listener error.', err));
      }
    }

    function updateSeenLine(theirLastRead){
      const seenEl = document.getElementById('seenLine');
      if(!activeOtherUser){ seenEl.textContent = ''; return; }
      const myLastMsg = [...lastRenderedMsgs].reverse().find(m => m.from === session.u);
      if(myLastMsg && theirLastRead && theirLastRead >= myLastMsg.timestamp){
        seenEl.textContent = `Seen ${timeAgo(theirLastRead)}`;
      }else{
        seenEl.textContent = '';
      }
    }

    function renderThread(msgs){
      lastRenderedMsgs = msgs;
      const threadEl = document.getElementById('chatThread');
      const wasAtBottom = (threadEl.scrollHeight - threadEl.scrollTop - threadEl.clientHeight) < 60;
      threadEl.innerHTML = msgs.length ? msgs.map(m => {
        const mine = m.from === session.u;
        const canDelete = mine || session.status === 'admin';
        return `
          <div class="msg-row ${mine ? 'mine' : 'theirs'}">
            <div class="msg-bubble">${escapeHtml(m.text)}</div>
            <div class="msg-meta">
              <span>${escapeHtml(m.fromName || m.from)} · ${timeAgo(m.timestamp)}</span>
              ${canDelete ? `<a href="#" data-delmsg="${m.id}">remove</a>` : ''}
            </div>
          </div>
        `;
      }).join('') : '<div style="color:var(--fog-dim); font-size:0.82rem;">No messages yet — say hello.</div>';

      threadEl.querySelectorAll('[data-delmsg]').forEach(a=>{
        a.addEventListener('click', async (e)=>{
          e.preventDefault();
          await deleteMessageDoc(a.dataset.delmsg);
        });
      });

      if(wasAtBottom || msgs.length <= 1){
        threadEl.scrollTop = threadEl.scrollHeight;
      }
    }

    function escapeHtml(str){
      const d = document.createElement('div');
      d.textContent = str || '';
      return d.innerHTML;
    }

    async function doSend(){
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if(!text) return;
      input.value = '';
      await sendMessage(activeChannel, text);
    }
    document.getElementById('chatSendBtn').addEventListener('click', doSend);
    document.getElementById('chatInput').addEventListener('keydown', (e)=>{
      if(e.key === 'Enter') doSend();
    });

    async function clearCurrentChat(){
      const ok = confirm(`Clear ${activeLabel} chat? This only clears it on your end — the other side will still see the full history and needs to clear it themselves.`);
      if(!ok) return;
      const ts = Date.now();
      myClearedAt[activeChannel] = ts; // optimistic — thread empties immediately
      try{
        await setChatClear(session.u, activeChannel, ts);
      }catch(e){
        console.error('Could not save chat clear.', e);
      }
      subscribeToChannel(activeChannel); // re-subscribe so the current snapshot is re-filtered right away
    }
    document.getElementById('clearChatBtn').addEventListener('click', clearCurrentChat);

    subscribeToChannel(activeChannel);
  }

                <label style="display:flex; align-items:center; gap:8px; font-size:0.85rem;">
                  <input type="checkbox" class="perm-write" data-section="${s.key}" ${rp[s.key] && rp[s.key].write ? 'checked' : ''}> Write

              </div>
            </div>
          `).join('')}

        e.preventDefault();
        renderRolesListView(body);

        const ro = document.getElementById('permReadout');
        ro.className = 'readout show ' + (ok ? 'ok' : 'err');
        ro.textContent = msg;
      }
      async function persist(sectionKey, readVal, writeVal){
        const current = permissions[role] || emptyPerms();
        current[sectionKey] = {read: readVal, write: writeVal};
        permissions[role] = current;
        await saveRolePermissions(role, current);
        flash(`Updated permissions for "${role}".`, true);
      }
      body.querySelectorAll('.perm-write').forEach(cb=>{
        cb.addEventListener('change', (e)=>{
          const sectionKey = e.target.dataset.section;
          const readBox = body.querySelector(`.perm-read[data-section="${sectionKey}"]`);
          if(e.target.checked) readBox.checked = true; // write implies read
          persist(sectionKey, readBox.checked, e.target.checked);
        });
      });
      body.querySelectorAll('.perm-read').forEach(cb=>{
        cb.addEventListener('change', (e)=>{
          const sectionKey = e.target.dataset.section;
          const writeBox = body.querySelector(`.perm-write[data-section="${sectionKey}"]`);
          if(!e.target.checked) writeBox.checked = false; // no read means no write either
          persist(sectionKey, e.target.checked, writeBox.checked);
        });
      });
    }

    document.getElementById('openManageRolesBtn').addEventListener('click', async ()=>{
      const body = openModal('Manage roles', '');
      await renderRolesListView(body);
    });
  }

  async function boot(){
    session = null;
    teardownAdminListener();
    teardownMessagesListener();
    teardownMessageWatch();
    stopHeartbeat();
    root.className = 'app';
    root.innerHTML = `<div class="panel">${rivets()}<div class="plate"><div class="brand">OE <span>FIELD</span> TOOL</div><div class="sub">Connecting…</div></div></div>`;
    try{
      if(!firebase.auth().currentUser){
        await firebase.auth().signInAnonymously();
      }
    }catch(e){
      console.error('Firebase sign-in failed.', e);
      root.innerHTML = `<div class="panel">${rivets()}<div class="plate"><div class="brand">OE <span>FIELD</span> TOOL</div></div><div class="readout show err">Could not connect. Check your internet connection and reload.</div></div>`;
      return;
    }
    try{
      await ensureSeedAdmin();
      await ensureSeedRolesPermissions();
    }catch(e){
      console.error('Startup data load failed (often a Firestore rules issue).', e);
      root.innerHTML = `<div class="panel">${rivets()}<div class="plate"><div class="brand">OE <span>FIELD</span> TOOL</div></div><div class="readout show err">Could not load app data. If you're the admin: check the Firestore security rules cover both the "users" and "meta" collections.</div></div>`;
      return;
    }

    let savedUser = null;
    try{ savedUser = localStorage.getItem(SESSION_KEY); }catch(e){}
    if(savedUser){
      const rec = await getUser(savedUser);
      if(rec){
        session = {u: rec.u, status: rec.status, fullName: rec.fullName || '', primaryRole: rec.primaryRole, secondaryRoles: rec.secondaryRoles || []};
        startHeartbeat();
        startMessageWatch();
        renderDashboard();
        return;
      }else{
        try{ localStorage.removeItem(SESSION_KEY); }catch(e){}
      }
    }
    renderGate();
  }
  boot();
})();
</script>
</body>
</html>
