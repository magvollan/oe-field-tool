<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>OE Field Tool</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="OE Field Tool">
<meta name="theme-color" content="#000000">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-950:#000000;
    --bg-900:#0A0A0A;
    --bg-800:#161616;
    --gray-700:#3A3A3A;
    --gray-600:#4E4E4E;
    --accent:#D9342B;
    --accent-glow:#FF5C4D;
    --fog:#EDEDED;
    --fog-dim:#9A9A9A;
    --alarm:#E0483B;
    --ok:#4C8C6B;
    --rivet:#4a4a4a;
    font-size:16px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:
      radial-gradient(ellipse at top, #161616 0%, var(--bg-950) 60%),
      var(--bg-950);
    background-attachment:fixed;
    color:var(--fog);
    font-family:'IBM Plex Sans',sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow-x:hidden;
    position:relative;
  }
  body::before{
    content:"";
    position:fixed;
    inset:0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size:36px 36px;
    pointer-events:none;
    z-index:0;
  }
  .app{
    position:relative;
    z-index:1;
    width:100%;
    max-width:440px;
    margin:24px;
  }
  .app.wide{max-width:760px;}

  /* ---------- Panel shell ---------- */
  .panel{
    background:linear-gradient(180deg,var(--bg-800),var(--bg-900));
    border:1px solid var(--gray-700);
    border-radius:10px;
    box-shadow:
      0 30px 60px -20px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(255,255,255,0.04);
    padding:28px 26px 24px;
    position:relative;
  }
  .rivet{
    position:absolute;
    width:9px;height:9px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #8a8a8a, var(--rivet) 70%);
    box-shadow:inset 0 1px 1px rgba(0,0,0,0.5);
  }
  .rivet.tl{top:10px;left:10px;} .rivet.tr{top:10px;right:10px;}
  .rivet.bl{bottom:10px;left:10px;} .rivet.br{bottom:10px;right:10px;}

  .plate{
    text-align:center;
    padding-bottom:18px;
    margin-bottom:20px;
    border-bottom:1px dashed var(--gray-700);
  }
  .plate .brand{
    font-family:'Rajdhani',sans-serif;
    font-weight:700;
    font-size:1.5rem;
    letter-spacing:0.14em;
    color:var(--fog);
    text-transform:uppercase;
  }
  .plate .brand span{color:var(--accent);}
  .plate .sub{
    font-family:'IBM Plex Mono',monospace;
    font-size:0.68rem;
    letter-spacing:0.12em;
    color:var(--fog-dim);
    text-transform:uppercase;
    margin-top:4px;
  }

  /* ---------- Power switch (signature element) ---------- */
  .power-stage{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
    padding:10px 0 4px;
  }
  .led{
    width:12px;height:12px;border-radius:50%;
    background:#2a1210;
    box-shadow:inset 0 0 2px rgba(0,0,0,0.8);
    transition:background 0.4s, box-shadow 0.4s;
  }
  .led.on{
    background:var(--accent-glow);
    box-shadow:0 0 8px 2px rgba(255,92,77,0.75), 0 0 22px 6px rgba(217,52,43,0.35);
  }
  .switch-wrap{
    display:flex; align-items:center; gap:12px;
    font-family:'IBM Plex Mono',monospace;
    font-size:0.68rem;
    letter-spacing:0.1em;
    color:var(--fog-dim);
    text-transform:uppercase;
  }
  .rocker{
    width:56px;height:30px;
    background:linear-gradient(180deg,#333333,#1a1a1a);
    border:1px solid var(--gray-700);
    border-radius:6px;
    position:relative;
    cursor:pointer;
    box-shadow:inset 0 2px 4px rgba(0,0,0,0.5);
  }
  .rocker .knob{
    position:absolute;
    top:3px; left:3px;
    width:24px;height:22px;
    border-radius:4px;
    background:linear-gradient(180deg,#8a8a8a,#565656);
    box-shadow:0 2px 3px rgba(0,0,0,0.5);
    transition:left 0.25s ease;
  }
  .rocker.up .knob{left:27px;background:linear-gradient(180deg,var(--accent-glow),var(--accent));}
  .power-hint{
    font-size:0.66rem;
    color:var(--fog-dim);
    font-family:'IBM Plex Mono',monospace;
    letter-spacing:0.08em;
    min-height:14px;
  }

  /* ---------- Form ---------- */
  .stage{
    animation:reveal 0.5s ease both;
  }
  @keyframes reveal{
    0%{opacity:0; transform:translateY(6px); filter:brightness(0.4);}
    60%{filter:brightness(1.3);}
    100%{opacity:1; transform:translateY(0); filter:brightness(1);}
  }
  .field{margin-bottom:14px;}
  .field label{
    display:block;
    font-family:'IBM Plex Mono',monospace;
    font-size:0.66rem;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--fog-dim);
    margin-bottom:6px;
  }
  .field input, .field select{
    width:100%;
    background:#0D0D0D;
    border:1px solid var(--gray-700);
    border-radius:5px;
    padding:11px 12px;
    color:var(--fog);
    font-family:'IBM Plex Mono',monospace;
    font-size:0.9rem;
    outline:none;
    transition:border-color 0.2s, box-shadow 0.2s;
  }
  .field input:focus, .field select:focus{
    border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(217,52,43,0.18);
  }
  .btn{
    width:100%;
    background:linear-gradient(180deg,#5c5c5c,#3a3a3a);
    border:none;
    border-radius:6px;
    padding:12px;
    color:#F2F2F2;
    font-family:'Rajdhani',sans-serif;
    font-weight:700;
    font-size:0.95rem;
    letter-spacing:0.08em;
    text-transform:uppercase;
    cursor:pointer;
    transition:filter 0.15s, transform 0.05s;
  }
  .btn:hover{filter:brightness(1.08);}
  .btn:active{transform:translateY(1px);}
  .btn.ghost{
    background:transparent;
    border:1px solid var(--gray-700);
    color:var(--fog-dim);
    margin-top:8px;
  }
  .btn.ghost:hover{border-color:var(--accent); color:var(--accent);}
  .btn.small{padding:8px 10px; font-size:0.78rem; width:auto;}
  .btn.danger{background:linear-gradient(180deg,#e0483b,#a5271d); color:#FCEAE8;}

  .readout{
    margin-top:14px;
    font-family:'IBM Plex Mono',monospace;
    font-size:0.72rem;
    letter-spacing:0.05em;
    padding:9px 11px;
    border-radius:5px;
    border:1px solid var(--gray-700);
    background:#0D0D0D;
    display:none;
  }
  .readout.show{display:block;}
  .readout.err{color:#F0A79A; border-color:rgba(192,69,58,0.6);}
  .readout.ok{color:#A9D3BE; border-color:rgba(76,140,107,0.6);}

  /* ---------- Dashboard ---------- */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:18px;
  }
  .who{font-family:'IBM Plex Mono',monospace; font-size:0.72rem; color:var(--fog-dim);}
  .who b{color:var(--accent);}
  .tabs{display:flex; gap:6px; margin-bottom:18px; flex-wrap:wrap;}
  .tab{
    font-family:'Rajdhani',sans-serif; font-weight:600; letter-spacing:0.05em;
    font-size:0.82rem; text-transform:uppercase;
    padding:8px 14px; border-radius:5px;
    border:1px solid var(--gray-700);
    color:var(--fog-dim); cursor:pointer; background:transparent;
  }
  .tab.active{border-color:var(--accent); color:var(--accent); background:rgba(217,52,43,0.1);}
  .cards{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  @media(max-width:520px){.cards{grid-template-columns:1fr;}}
  .card{
    border:1px solid var(--gray-700);
    border-radius:8px;
    padding:16px;
    background:#111111;
    min-height:110px;
    display:flex; flex-direction:column; justify-content:space-between;
  }
  .card h3{
    font-family:'Rajdhani',sans-serif; margin:0 0 6px; font-size:1.05rem;
    letter-spacing:0.03em; color:var(--fog);
  }
  .card p{margin:0; font-size:0.8rem; color:var(--fog-dim); line-height:1.4;}
  .tag{
    align-self:flex-start;
    font-family:'IBM Plex Mono',monospace; font-size:0.62rem;
    letter-spacing:0.08em; text-transform:uppercase;
    color:var(--fog-dim); border:1px solid var(--gray-700);
    padding:3px 7px; border-radius:20px; margin-top:10px;
  }

  .userlist{margin-top:16px; display:flex; flex-direction:column; gap:8px;}
  .urow{
    display:flex; align-items:center; justify-content:space-between;
    border:1px solid var(--gray-700); border-radius:6px; padding:10px 12px;
    background:#0D0D0D;
  }
  .urow .name{font-family:'IBM Plex Mono',monospace; font-size:0.82rem;}
  .urow .role{color:var(--fog-dim); font-size:0.68rem; margin-left:8px;}

  .section-title{
    font-family:'Rajdhani',sans-serif; font-weight:600; letter-spacing:0.08em;
    text-transform:uppercase; font-size:0.85rem; color:var(--fog-dim);
    margin:22px 0 10px; padding-top:14px; border-top:1px dashed var(--gray-700);
  }
  .hidden{display:none;}
</style>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
</head>
<body>

<div class="app" id="root"></div>

<script>
(function(){
  const root = document.getElementById('root');
  let session = null; // {u, status} — memory only, not persisted (by design)

  const JOB_ROLES = ['Technician','Radio Surveyor','Engineer','Coordinator','HR','Other'];
  const DEFAULT_ADMIN_USER = 'admin';
  const DEFAULT_ADMIN_PASS = 'OEAdmin';

  // ---------- Firebase ----------
  // This config is a public identifier, not a secret — access is controlled by Firestore rules, not by hiding this.
  const firebaseConfig = {
    apiKey: "AIzaSyAw-IJTwUSRneJsjCg-WiI7cSc4iwEjrEw",
    authDomain: "oe-field-tool.firebaseapp.com",
    projectId: "oe-field-tool",
    storageBucket: "oe-field-tool.firebasestorage.app",
    messagingSenderId: "1089649415892",
    appId: "1:1089649415892:web:c993832503e3e4aeb58d41"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const USERS_COLLECTION = 'users';

  function usersCol(){ return db.collection(USERS_COLLECTION); }

  // ---------- storage helpers ----------
  // Backed by Firestore. Anonymous auth (silent, no UI) satisfies the security
  // rules that gate this collection — it is not the app's own login screen.
  async function loadUsers(){
    try{
      const snap = await usersCol().get();
      return snap.docs.map(d => d.data());
    }catch(e){
      console.error('Could not load accounts from Firestore.', e);
      return [];
    }
  }
  async function getUser(u){
    try{
      const doc = await usersCol().doc(u).get();
      return doc.exists ? doc.data() : null;
    }catch(e){
      console.error('Could not load account from Firestore.', e);
      return null;
    }
  }
  async function saveUser(userObj){
    await usersCol().doc(userObj.u).set(userObj);
  }
  async function deleteUser(u){
    await usersCol().doc(u).delete();
  }
  function bufToHex(buf){
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }
  function randSaltHex(){
    const arr = new Uint8Array(16);
    crypto.getRandomValues(arr);
    return bufToHex(arr.buffer);
  }
  async function hashPassword(password, saltHex){
    const enc = new TextEncoder();
    let data = enc.encode(saltHex + password);
    let digest = await crypto.subtle.digest('SHA-256', data);
    // light stretching
    for(let i=0;i<2000;i++){
      digest = await crypto.subtle.digest('SHA-256', new Uint8Array([...new Uint8Array(digest), ...enc.encode(saltHex)]));
    }
    return bufToHex(digest);
  }
  async function ensureSeedAdmin(){
    const existing = await getUser(DEFAULT_ADMIN_USER);
    const all = await loadUsers();
    if(all.length === 0 && !existing){
      const salt = randSaltHex();
      const hash = await hashPassword(DEFAULT_ADMIN_PASS, salt);
      await saveUser({u: DEFAULT_ADMIN_USER, salt, hash, status:'admin', jobRole:'Coordinator', created: Date.now()});
    }
  }

  // ---------- rivets ----------
  function rivets(){
    return '<span class="rivet tl"></span><span class="rivet tr"></span><span class="rivet bl"></span><span class="rivet br"></span>';
  }

  function jobRoleOptions(selected){
    return JOB_ROLES.map(r => `<option value="${r}" ${r===selected?'selected':''}>${r}</option>`).join('');
  }

  // ---------- render: power-up gate wrapping login ----------
  function renderGate(){
    root.className = 'app';
    root.innerHTML = `
      <div class="panel">
        ${rivets()}
        <div class="plate">
          <div class="brand">OE <span>FIELD</span> TOOL</div>
          <div class="sub">Oddstøl Elektronikk · Bridge Access Panel</div>
        </div>
        <div class="power-stage">
          <div class="led" id="led"></div>
          <div class="switch-wrap">
            <span>Off</span>
            <div class="rocker" id="rocker"><div class="knob"></div></div>
            <span>On</span>
          </div>
          <div class="power-hint" id="powerhint">Flip the switch to power up the panel</div>
        </div>
        <div id="stageArea"></div>
      </div>
    `;
    const rocker = document.getElementById('rocker');
    const led = document.getElementById('led');
    const hint = document.getElementById('powerhint');
    rocker.addEventListener('click', ()=>{
      if(rocker.classList.contains('up')) return;
      rocker.classList.add('up');
      led.classList.add('on');
      hint.textContent = 'Panel online';
      setTimeout(renderLoginForm, 350);
    });
  }

  function renderLoginForm(){
    const area = document.getElementById('stageArea');
    area.innerHTML = `
      <div class="stage">
        <div class="field"><label>Username</label><input id="lu" autocomplete="username"></div>
        <div class="field"><label>Password</label><input id="lp" type="password" autocomplete="current-password"></div>
        <button class="btn" id="loginBtn">Log in</button>
        <div class="readout" id="loginReadout"></div>
      </div>
    `;
    document.getElementById('lp').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
    document.getElementById('loginBtn').addEventListener('click', doLogin);

    async function doLogin(){
      const u = document.getElementById('lu').value.trim().toLowerCase();
      const p = document.getElementById('lp').value;
      const ro = document.getElementById('loginReadout');
      ro.className = 'readout show';
      const rec = await getUser(u);
      if(!rec){ ro.classList.add('err'); ro.textContent = 'ACCESS DENIED — unknown username.'; return; }
      const hash = await hashPassword(p, rec.salt);
      if(hash !== rec.hash){ ro.classList.add('err'); ro.textContent = 'ACCESS DENIED — incorrect password.'; return; }
      session = {u: rec.u, status: rec.status};
      ro.classList.remove('err'); ro.classList.add('ok');
      ro.textContent = 'Access granted.';
      setTimeout(renderDashboard, 350);
    }
  }

  // ---------- dashboard ----------
  function renderDashboard(tab){
    tab = tab || 'overview';
    root.className = 'app wide';
    root.innerHTML = `
      <div class="panel">
        ${rivets()}
        <div class="topbar">
          <div class="plate" style="border:none;margin:0;padding:0;text-align:left;">
            <div class="brand" style="font-size:1.15rem;">OE <span>FIELD</span> TOOL</div>
          </div>
          <div class="who">Logged in as <b>${session.u}</b> (${session.status}) · <a href="#" id="logoutLink" style="color:var(--fog-dim);">log out</a></div>
        </div>
        <div class="tabs" id="tabs">
          <button class="tab" data-tab="overview">Overview</button>
          <button class="tab" data-tab="reference">Reference</button>
          <button class="tab" data-tab="calculators">Calculators</button>
          ${session.status==='admin' ? '<button class="tab" data-tab="admin">Admin</button>' : ''}
        </div>
        <div id="tabContent"></div>
      </div>
    `;
    document.getElementById('logoutLink').addEventListener('click', (e)=>{
      e.preventDefault();
      session = null;
      boot();
    });
    Array.from(document.querySelectorAll('.tab')).forEach(btn=>{
      btn.addEventListener('click', ()=> renderDashboard(btn.dataset.tab));
    });
    document.querySelectorAll('.tab').forEach(b=>{
      if(b.dataset.tab === tab) b.classList.add('active');
    });

    const content = document.getElementById('tabContent');
    if(tab === 'overview'){
      content.innerHTML = `
        <div class="cards">
          <div class="card"><h3>Checklists &amp; Jobs</h3><p>Job checklists, notes and photos per vessel.</p><span class="tag">Not installed yet</span></div>
          <div class="card"><h3>Reference Library</h3><p>SFI codes and equipment specs.</p><span class="tag">Not installed yet</span></div>
          <div class="card"><h3>Calculators</h3><p>Cable sizing, fuse lists and conversions.</p><span class="tag">Not installed yet</span></div>
          <div class="card"><h3>Admin</h3><p>Manage who can log in to this panel.</p><span class="tag">${session.status==='admin' ? 'Available' : 'Admin only'}</span></div>
        </div>
      `;
    } else if(tab === 'reference' || tab === 'calculators'){
      content.innerHTML = `<div class="card" style="min-height:80px;"><h3>Coming soon</h3><p>Tell Claude what you want in here and it'll get built into this panel.</p></div>`;
    } else if(tab === 'admin' && session.status==='admin'){
      renderAdmin(content);
    }
  }

  async function renderAdmin(content){
    const users = await loadUsers();
    content.innerHTML = `
      <div class="section-title" style="margin-top:0;border-top:none;padding-top:0;">Create new account</div>
      <div class="field"><label>Username</label><input id="nu"></div>
      <div class="field"><label>Temporary password</label><input id="np" type="password"></div>
      <div class="field"><label>Account status</label>
        <select id="nstatus"><option value="user">User</option><option value="admin">Admin</option></select>
      </div>
      <div class="field"><label>Role</label>
        <select id="nrole">${jobRoleOptions('Technician')}</select>
      </div>
      <div class="field" id="nroleOtherWrap" style="display:none;"><label>Specify role</label><input id="nroleOther"></div>
      <button class="btn" id="addUserBtn">Create account</button>
      <div class="readout" id="adminReadout"></div>
      <div class="section-title">Existing accounts</div>
      <div class="userlist" id="userlist"></div>
    `;

    document.getElementById('nrole').addEventListener('change', (e)=>{
      document.getElementById('nroleOtherWrap').style.display = e.target.value === 'Other' ? 'block' : 'none';
    });

    function flash(msg, ok){
      const ro = document.getElementById('adminReadout');
      ro.className = 'readout show ' + (ok ? 'ok' : 'err');
      ro.textContent = msg;
    }

    function renderList(list){
      const ul = document.getElementById('userlist');
      ul.innerHTML = list.map(x => `
        <div class="urow" style="flex-direction:column; align-items:stretch; gap:8px;">
          <div style="display:flex; align-items:center; justify-content:space-between;">
            <div><span class="name">${x.u}</span><span class="role">${x.status} · ${x.jobRole || '—'}</span></div>
            <div style="display:flex; gap:6px;">
              <button class="btn ghost small" data-edit="${x.u}">Edit</button>
              <button class="btn danger small" data-del="${x.u}">Remove</button>
            </div>
          </div>
          <div class="edit-area hidden" id="edit-${x.u}"></div>
        </div>
      `).join('');

      ul.querySelectorAll('[data-del]').forEach(btn=>{
        btn.addEventListener('click', async ()=>{
          const target = btn.dataset.del;
          let list2 = await loadUsers();
          const admins = list2.filter(x=>x.status==='admin');
          if(target === session.u){ flash('You cannot remove the account you are logged in as.'); return; }
          if(admins.length===1 && admins[0].u===target){ flash('Cannot remove the last remaining admin.'); return; }
          await deleteUser(target);
          renderList(await loadUsers());
        });
      });

      ul.querySelectorAll('[data-edit]').forEach(btn=>{
        btn.addEventListener('click', ()=>{
          const target = btn.dataset.edit;
          const rec = list.find(x=>x.u===target);
          const area = document.getElementById('edit-'+target);
          const isHidden = area.classList.contains('hidden');
          // collapse any other open editors first
          ul.querySelectorAll('.edit-area').forEach(a=>a.classList.add('hidden'));
          if(!isHidden){ return; }
          area.classList.remove('hidden');
          area.innerHTML = `
            <div class="field"><label>Account status</label>
              <select class="e-status">
                <option value="user" ${rec.status==='user'?'selected':''}>User</option>
                <option value="admin" ${rec.status==='admin'?'selected':''}>Admin</option>
              </select>
            </div>
            <div class="field"><label>Role</label>
              <select class="e-role">${jobRoleOptions(JOB_ROLES.includes(rec.jobRole) ? rec.jobRole : 'Other')}</select>
            </div>
            <div class="field e-role-other-wrap" style="${JOB_ROLES.includes(rec.jobRole) ? 'display:none;' : ''}">
              <label>Specify role</label><input class="e-role-other" value="${JOB_ROLES.includes(rec.jobRole) ? '' : (rec.jobRole||'')}">
            </div>
            <div class="field"><label>Reset password (leave blank to keep current)</label><input class="e-pass" type="password"></div>
            <button class="btn small" style="width:auto;" data-save="${target}">Save changes</button>
          `;
          area.querySelector('.e-role').addEventListener('change', (e)=>{
            area.querySelector('.e-role-other-wrap').style.display = e.target.value === 'Other' ? 'block' : 'none';
          });
          area.querySelector('[data-save]').addEventListener('click', async ()=>{
            let list2 = await loadUsers();
            const idx = list2.findIndex(x=>x.u===target);
            if(idx===-1) return;
            const newStatus = area.querySelector('.e-status').value;
            const admins = list2.filter(x=>x.status==='admin');
            if(admins.length===1 && admins[0].u===target && newStatus!=='admin'){
              flash('Cannot demote the last remaining admin.'); return;
            }
            let newRole = area.querySelector('.e-role').value;
            if(newRole === 'Other'){
              newRole = area.querySelector('.e-role-other').value.trim() || 'Other';
            }
            const newPass = area.querySelector('.e-pass').value;
            const updated = { ...list2[idx], status: newStatus, jobRole: newRole };
            if(newPass){
              if(newPass.length < 6){ flash('New password should be at least 6 characters.'); return; }
              const salt = randSaltHex();
              updated.salt = salt;
              updated.hash = await hashPassword(newPass, salt);
            }
            await saveUser(updated);
            flash(`Account "${target}" updated.`, true);
            renderList(await loadUsers());
          });
        });
      });
    }

    renderList(users);

    document.getElementById('addUserBtn').addEventListener('click', async ()=>{
      const u = document.getElementById('nu').value.trim().toLowerCase();
      const p = document.getElementById('np').value;
      const status = document.getElementById('nstatus').value;
      let jobRole = document.getElementById('nrole').value;
      if(jobRole === 'Other'){
        jobRole = document.getElementById('nroleOther').value.trim() || 'Other';
      }
      if(!u || !p){ flash('Username and password are required.'); return; }
      if(p.length < 6){ flash('Password should be at least 6 characters.'); return; }
      const exists = await getUser(u);
      if(exists){ flash('That username already exists.'); return; }
      const salt = randSaltHex();
      const hash = await hashPassword(p, salt);
      await saveUser({u, salt, hash, status, jobRole, created: Date.now()});
      flash(`Account "${u}" created.`, true);
      document.getElementById('nu').value=''; document.getElementById('np').value='';
      document.getElementById('nroleOther').value='';
      renderList(await loadUsers());
    });
  }

  // ---------- boot ----------
  async function boot(){
    session = null;
    root.className = 'app';
    root.innerHTML = `<div class="panel">${rivets()}<div class="plate"><div class="brand">OE <span>FIELD</span> TOOL</div><div class="sub">Connecting…</div></div></div>`;
    try{
      if(!firebase.auth().currentUser){
        await firebase.auth().signInAnonymously();
      }
    }catch(e){
      console.error('Firebase sign-in failed.', e);
      root.innerHTML = `<div class="panel">${rivets()}<div class="plate"><div class="brand">OE <span>FIELD</span> TOOL</div></div><div class="readout show err">Could not connect. Check your internet connection and reload.</div></div>`;
      return;
    }
    await ensureSeedAdmin();
    renderGate();
  }
  boot();
})();
</script>
</body>
</html>
